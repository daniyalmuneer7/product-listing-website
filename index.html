<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo-container">
    <img src="assests/logo.png" alt="Apexcify Logo" class="logo">
    <h1>Apexcify Store</h1>
  </div>

  <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
  <button onclick="filterCheap()">Under $500</button>
  <div class="cart">🛒 Cart: <span id="cartCount">0</span></div>
</header>


<div class="products" id="productList"></div>

<script src="script.js"></script>
</body>
</html>
